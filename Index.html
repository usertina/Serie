<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#080810">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Chosen</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Añadimos HLS.js para soporte de streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div id="app">

        <header>
            <div class="header-inner">
                <span class="cross">✝</span>
                <div>
                    <h1>The Chosen</h1>
                    <p class="subtitle">Temporada 1 · 16 episodios</p>
                </div>
            </div>
        </header>

        <main id="lista"></main>

        <footer>
            <p>Al pulsar ▶ el episodio se abre a pantalla completa en el navegador</p>
        </footer>

    </div>

    <!-- Modal para el reproductor de video -->
    <div id="videoModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <video id="modalVideo" controls playsinline></video>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
